<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天机器人</title>
    <style>
        /* 页面整体背景色 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7fa;  /* 淡蓝色背景 */
            color: #333;
            text-align: center;
            margin-top: 50px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 30px;
        }

        .chatbot-container {
            width: 100%;
            max-width: 800px;  /* 限制聊天框最大宽度 */
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;  /* 圆角 */
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);  /* 阴影效果 */
            overflow: hidden;  /* 防止聊天框溢出 */
        }

        iframe {
            width: 100%;
            height: 700px;
            min-height: 700px;
            border: none;
            border-radius: 10px;  /* 给聊天框添加圆角 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);  /* 给聊天框添加阴影 */
            transition: transform 0.3s ease;
        }

        iframe:hover {
            transform: scale(1.05);  /* 鼠标悬停时聊天框放大 */
        }

        /* 响应式：在移动设备上调整 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .chatbot-container {
                width: 100%;
                max-width: 100%;
                padding: 10px;
            }
            iframe {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <h1>与聊天机器人对话</h1>
    
    <div class="chatbot-container">
        <iframe
            src="https://udify.app/chatbot/UtPByh1qPIaIntjp"
            allow="microphone">
        </iframe>
    </div>
</body>
</html>
